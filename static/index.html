<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF 校对助手</title>
<link rel="stylesheet" href="/static/css/styles.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
<div id="app">
  <!-- Toolbar -->
  <header id="toolbar">
    <div class="toolbar-left">
      <button id="btn-upload" class="btn-primary" title="上传 PDF">
        <i class="ri-upload-2-line"></i> 上传 PDF
      </button>
      <button id="btn-start" class="btn-success" disabled title="开始校对">
        <i class="ri-play-line"></i> 开始校对
      </button>
      <button id="btn-stop" class="btn-danger" disabled title="停止校对">
        <i class="ri-stop-line"></i> 停止校对
      </button>
      <button id="btn-export" class="btn-outline" disabled title="导出标注版 PDF">
        <i class="ri-download-line"></i> 导出
      </button>
      <span class="toolbar-divider"></span>
      <button id="btn-select-all" class="btn-ghost" disabled title="全选问题条目">
        <i class="ri-checkbox-circle-line"></i> 全选
      </button>
      <button id="btn-deselect-all" class="btn-ghost" disabled title="取消全选">
        <i class="ri-checkbox-blank-circle-line"></i> 取消全选
      </button>
    </div>
    <div class="toolbar-center">
      <button id="btn-prev-error" class="btn-icon" disabled title="上一页有问题的"><i class="ri-arrow-up-s-line"></i></button>
      <span id="page-indicator">共 0 页 / 0 处问题</span>
      <button id="btn-next-error" class="btn-icon" disabled title="下一页有问题的"><i class="ri-arrow-down-s-line"></i></button>
    </div>
    <div class="toolbar-right">
      <span id="excluded-count" class="excluded-hint" style="display:none"></span>
      <span id="model-badge" class="badge">DeepSeek</span>
      <span id="filename-display" class="filename"></span>
      <button id="btn-settings" class="btn-icon" title="设置 API Key"><i class="ri-settings-3-line"></i></button>
    </div>
  </header>

  <!-- Main Content -->
  <main id="main">
    <!-- Page Navigation Sidebar -->
    <nav id="page-nav">
      <div id="page-nav-header">页面导航</div>
      <div id="page-nav-list"></div>
      <div id="filter-bar">
        <button class="filter-btn active" data-category="all">全部</button>
        <button class="filter-btn" data-category="错别字">错别字</button>
        <button class="filter-btn" data-category="标点错误">标点错误</button>
        <button class="filter-btn" data-category="用语不规范">用语不规范</button>
        <button class="filter-btn" data-category="禁用词">禁用词</button>
      </div>
    </nav>

    <!-- Annotation Panel (full width) -->
    <section id="annotation-panel">
      <div id="upload-placeholder">
        <i class="ri-file-pdf-2-line"></i>
        <p>上传 PDF 文件开始校对</p>
      </div>
      <div id="progress-overlay" style="display:none">
        <div class="progress-ring">
          <div class="progress-bar-container">
            <div class="progress-bar-fill" id="progress-fill"></div>
          </div>
          <span id="progress-page-text">0 / 0 页</span>
          <span id="progress-errors-text">已发现 0 处问题</span>
        </div>
      </div>
      <div id="annotation-list"></div>
    </section>
  </main>

  <!-- Status Bar -->
  <footer id="status-bar">
    <span id="status-left">
      <span id="status-dot" class="status-dot idle"></span>
      <span id="status-text">就绪</span>
    </span>
    <span id="status-right">
      <span id="elapsed-time" style="display:none">耗时 00:00</span>
      <span class="status-sep" id="status-sep" style="display:none">|</span>
      <span id="progress-text"></span>
    </span>
  </footer>
</div>

<!-- Hidden file input -->
<input type="file" id="file-input" accept=".pdf" style="display:none">

<!-- API Key Settings Modal -->
<div id="settings-modal" class="modal-overlay" style="display:none">
  <div class="modal-card">
    <div class="modal-header">
      <h3><i class="ri-key-2-line"></i> API 设置</h3>
      <button id="btn-close-modal" class="btn-icon"><i class="ri-close-line"></i></button>
    </div>
    <div class="modal-body">
      <p class="modal-desc">输入你的 DeepSeek API Key，Key 仅保存在浏览器本地。</p>
      <div class="input-group">
        <input type="password" id="api-key-input" placeholder="sk-..." autocomplete="off">
        <button id="btn-toggle-visibility" class="btn-icon" title="显示/隐藏"><i class="ri-eye-off-line"></i></button>
      </div>
      <div id="key-status" class="key-status"></div>
    </div>
    <div class="modal-footer">
      <button id="btn-validate-key" class="btn-primary">验证并保存</button>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
